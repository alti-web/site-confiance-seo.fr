name: Generate Blog Article

on:
  schedule:
    # Every 3 days at 9:00 UTC
    - cron: '0 9 */3 * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk

      - name: Generate new article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-article.mjs

      - name: Build site to validate
        run: npm run build

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/*.md
          if git diff --staged --quiet; then
            echo "No new article to commit"
            exit 0
          fi
          TITLE=$(git diff --staged --name-only | head -1 | sed 's|src/content/blog/||;s|\.md||;s|-| |g')
          git commit -m "blog: new article — ${TITLE}"
          git push
